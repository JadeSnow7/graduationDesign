 font-size="19" fill="#2E4A62" font-weight="600" text-anchor="start" dominant-baseline="hanging" font-style="normal"><tspan x="1036" y="200">Proposed: Hybrid GraphRAG</tspan></text><line x1="1036" y1="232" x2="1180" y2="232" stroke="#2E4A62" stroke-width="2"/><rect x="240" y="286" width="520" height="78" rx="16" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="2"/><text font-family="Inter, &#x27;Noto Sans SC&#x27;, &#x27;SF Pro Text&#x27;, Roboto, sans-serif" font-size="15" fill="#2B2B2B" font-weight="500" text-anchor="middle" dominant-baseline="hanging" font-style="normal"><tspan x="500" y="316.15">Data: Flat Chunks</tspan></text><rect x="240" y="404" width="520" height="78" rx="16" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="2"/><text font-family="Inter, &#x27;Noto Sans SC&#x27;, &#x27;SF Pro Text&#x27;, Roboto, sans-serif" font-size="15" fill="#2B2B2B" font-weight="500" text-anchor="middle" dominant-baseline="hanging" font-style="normal"><tspan x="500" y="434.15">Retrieve: Vector Top-k</tspan></text><rect x="240" y="522" width="520" height="78" rx="16" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="2"/><text font-family="Inter, &#x27;Noto Sans SC&#x27;, &#x27;SF Pro Text&#x27;, Roboto, sans-serif" font-size="15" fill="#2B2B2B" font-weight="500" text-anchor="middle" dominant-baseline="hanging" font-style="normal"><tspan x="500" y="552.15">Generate: Prompt + Chunks</tspan></text><rect x="240" y="640" width="520" height="82" rx="16" fill="#FFF7F7" stroke="#C53030" stroke-width="2" stroke-dasharray="8 6"/><text font-family="Inter, &#x27;Noto Sans SC&#x27;, &#x27;SF Pro Text&#x27;, Roboto, sans-serif" font-size="15" fill="#2B2B2B" font-weight="450" text-anchor="middle" dominant-baseline="hanging" font-style="normal"><tspan x="500" y="663.3">Cite: Weak Chunk-level</tspan><tspan x="500" y="681">Attribution</tspan></text><rect x="1070" y="286" width="420" height="78" rx="16" fill="#F7FAFC" stroke="#2E4A62" stroke-width="2"/><text font-family="Inter, &#x27;Noto Sans SC&#x27;, &#x27;SF Pro Text&#x27;, Roboto, sans-serif" font-size="15" fill="#2B2B2B" font-weight="500" text-anchor="middle" dominant-baseline="hanging" font-style="normal"><tspan x="1280" y="307.3">Data: Chunks +</tspan><tspan x="1280" y="325">Knowledge Graph</tspan></text><rect x="1070" y="404" width="420" height="78" rx="16" fill="#F7FAFC" stroke="#2E4A62" stroke-width="2"/><text font-family="Inter, &#x27;Noto Sans SC&#x27;, &#x27;SF Pro Text&#x27;, Roboto, sans-serif" font-size="15" fill="#2B2B2B" font-weight="500" text-anchor="middle" dominant-baseline="hanging" font-style="normal"><tspan x="1280" y="425.3">Retrieve: Seed Vector +</tspan><tspan x="1280" y="443">K-hop Expansion</tspan></text><rect x="1070" y="522" width="420" height="78" rx="16" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="2"/><text font-family="Inter, &#x27;Noto Sans SC&#x27;, &#x27;SF Pro Text&#x27;, Roboto, sans-serif" font-size="15" fill="#2B2B2B" font-weight="500" text-anchor="middle" dominant-baseline="hanging" font-style="normal"><tspan x="1280" y="543.3">Generate: Prompt +</tspan><tspan x="1280" y="561">Structured Evidence</tspan></text><rect x="1070" y="640" width="420" height="82" rx="16" fill="#F7FAFC" stroke="#2E4A62" stroke-width="2"/><text font-family="Inter, &#x27;Noto Sans SC&#x27;, &#x27;SF Pro Text&#x27;, Roboto, sans-serif" font-size="15" fill="#2B2B2B" font-weight="500" text-anchor="middle" dominant-baseline="hanging" font-style="normal"><tspan x="1280" y="672.15">Cite: Strict Evidence Alignment</tspan></text><rect x="1520" y="392" width="248" height="178" rx="14" fill="#FFFCF6" stroke="#C19B6C" stroke-width="2"/><text font-family="Inter, &#x27;Noto Sans SC&#x27;, &#x27;SF Pro Text&#x27;, Roboto, sans-serif" font-size="14" fill="#C19B6C" font-weight="600" text-anchor="start" dominant-baseline="hanging" font-style="normal"><tspan x="1540" y="410">Why Graph in Education?</tspan></text><text font-family="Inter, &#x27;Noto Sans SC&#x27;, &#x27;SF Pro Text&#x27;, Roboto, sans-serif" font-size="13" fill="#2B2B2B" font-weight="400" text-anchor="start" dominant-baseline="hanging" font-style="italic"><tspan x="1540" y="438">- Captures structured dependencies</tspan><tspan x="1540" y="456">- Enables multi-hop reasoning</tspan><tspan x="1540" y="474">- Ensures strict logic traceability</tspan></text><path d="M 500 364 L 500 404" fill="none" stroke="#4B4B4B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/><path d="M 500 482 L 500 522" fill="none" stroke="#4B4B4B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/><path d="M 500 600 L 500 640" fill="none" stroke="#4B4B4B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/><path d="M 1280 364 L 1280 404" fill="none" stroke="#4B4B4B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/><path d="M 1280 482 L 1280 522" fill="none" stroke="#4B4B4B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/><path d="M 1280 600 L 1280 640" fill="none" stroke="#4B4B4B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/></g>
